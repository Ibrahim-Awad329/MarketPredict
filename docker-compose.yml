version: '3.9'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - ./backend:/app
  redis:
    image: redis:7-alpine
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketpredict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  celery-worker:
    build: .
    command: celery -A app.core.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - db
