version: '3.9'

services:
  backend:
    build: .
    container_name: marketpredict-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/marketpredict
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./models:/app/models
    networks:
      - marketpredict-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    container_name: marketpredict-db
    environment:
      POSTGRES_DB: marketpredict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marketpredict-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketpredict-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketpredict-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    container_name: marketpredict-celery
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/marketpredict
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
    networks:
      - marketpredict-network
    command: celery -A app.core.celery_app worker -l info

volumes:
  postgres_data:
  redis_data:
  models:

networks:
  marketpredict-network:
    driver: bridge
